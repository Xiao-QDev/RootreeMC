name: Build and Release

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: RootreeMC

jobs:
  resolve-version:
    name: Resolve Plugin Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      main_dir: ${{ steps.main.outputs.main_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect plugin version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          VERSION_FILE=""
          for file in ".codex-plugin/plugin.json" "plugin.json" "Plugin Loader/plugin.json"; do
            if [[ -f "$file" ]]; then
              VERSION_FILE="$file"
              break
            fi
          done

          VERSION=""
          if [[ -n "$VERSION_FILE" ]]; then
            VERSION="$(jq -r '.version // empty' "$VERSION_FILE")"
          fi

          # Fallback for custom server repos without plugin metadata.
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            VERSION="build-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
            echo "No plugin version file found, fallback version: ${VERSION}"
          else
            echo "Plugin version: ${VERSION} (from ${VERSION_FILE})"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_name=RootreeMC ${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Detect main package
        id: main
        shell: bash
        run: |
          set -euo pipefail

          MAIN_DIR_RAW="$(
            git ls-files '*.go' \
              | while IFS= read -r file; do
                  if grep -Eq '^[[:space:]]*package[[:space:]]+main[[:space:]]*$' "$file"; then
                    dirname "$file"
                  fi
                done \
              | sort -u \
              | head -n 1
          )"

          if [[ -z "$MAIN_DIR_RAW" ]]; then
            echo "::error::No 'package main' file found. Cannot build Linux/Windows executables."
            echo "::error::Tip: add an entrypoint like cmd/rootreemc/main.go"
            exit 1
          fi

          if [[ "$MAIN_DIR_RAW" == "." ]]; then
            MAIN_DIR="./"
          else
            MAIN_DIR="./${MAIN_DIR_RAW}"
          fi

          echo "main_dir=${MAIN_DIR}" >> "$GITHUB_OUTPUT"
          echo "Main package directory: ${MAIN_DIR}"

  build-binaries:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        shell: bash
        env:
          MAIN_DIR: ${{ needs.resolve-version.outputs.main_dir }}
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN_NAME="${APP_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "-s -w" -o "dist/${BIN_NAME}" "${MAIN_DIR}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - build-binaries
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: binary-*
          merge-multiple: true

      - name: Create or update release by plugin version
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.release_tag }}
          name: ${{ needs.resolve-version.outputs.release_name }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: |
            release-assets/${{ env.APP_NAME }}-linux-amd64
            release-assets/${{ env.APP_NAME }}-windows-amd64.exe
          overwrite_files: true
